<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary My Love ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;500&family=Dancing+Script:wght@700&display=swap');

        body {
            margin: 0; padding: 0;
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(180deg, #ffeef2 0%, #ffdeeb 100%);
            color: #555;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .heart-fall {
            position: fixed; top: -10%; color: #ff4d6d; font-size: 20px;
            z-index: -1; animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        header { margin-top: 40px; z-index: 1; }
        h1 { font-family: 'Dancing Script', cursive; color: #ff4d6d; font-size: 4rem; margin: 10px 0; }

        /* ตัวนับวัน (Timer) */
        .timer-container {
            background: rgba(255, 255, 255, 0.6);
            padding: 15px 25px;
            border-radius: 50px;
            margin: 20px 0;
            font-weight: 500;
            color: #ff4d6d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 1;
        }

        /* กรอบรูปขนาดใหญ่ที่ขยายแล้ว */
        .photo-frame {
            position: relative; width: 350px; height: 350px; 
            border: 12px solid white; border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            overflow: hidden; z-index: 1; background: white;
            margin-bottom: 20px;
        }

        .envelope-placeholder {
            width: 100%; height: 100%; display: flex;
            justify-content: center; align-items: center;
            font-size: 150px; background-color: #fff0f3;
        }

        .slideshow-container { width: 100%; height: 100%; position: relative; }
        .mySlides { display: none; width: 100%; height: 100%; position: absolute; }
        .mySlides img { width: 100%; height: 100%; object-fit: cover; }

        /* ปุ่มต่างๆ */
        #question-area { margin-top: 20px; text-align: center; z-index: 10; }
        .btn-group { margin-top: 15px; position: relative; height: 60px; width: 300px; }
        
        .btn {
            padding: 12px 35px; font-size: 1.2rem; border-radius: 50px;
            border: none; cursor: pointer; font-family: 'Prompt'; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
        }
        #start-btn, #yes-btn { background: #ff4d6d; color: white; }
        #no-btn { background: #aaa; color: white; position: absolute; white-space: nowrap; }

        .message-box {
            max-width: 500px; width: 85%; background: white;
            padding: 40px; border-radius: 35px; margin: 30px auto;
            line-height: 2; box-shadow: 0 10px 25px rgba(255,77,109,0.15);
            border-bottom: 6px solid #ff4d6d; display: none;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header><h1>Our Love Story</h1></header>

    <div class="photo-frame">
        <div id="envelope" class="envelope-placeholder">💌</div>
        <div id="slideshow" class="slideshow-container hidden">
            <div class="mySlides"><img src="62805.jpg"></div>
            <div class="mySlides"><img src="62806.jpg"></div>
            <div class="mySlides"><img src="62807.jpg"></div>
            <div class="mySlides"><img src="62808.jpg"></div>
            <div class="mySlides"><img src="62809.jpg"></div>
            <div class="mySlides"><img src="62810.jpg"></div>
            <div class="mySlides"><img src="62811.jpg"></div>
        </div>
    </div>

    <div class="timer-container">
        เราอยู่ด้วยกันมาแล้ว <span id="days-count">0</span> วัน
    </div>

    <button id="start-btn" class="btn">กดตรงนี้สิคับ❤️</button>

    <div id="question-area" class="hidden">
        <h2 style="color:#ff4d6d;">อยากดูมั้ย? 🥺</h2>
        <div class="btn-group">
            <button id="yes-btn" class="btn">อยากสิทำไมจะไม่ ❤️</button>
            <button id="no-btn" class="btn">ไม่ดูหรอก 😜</button>
        </div>
    </div>

    <div id="surprise-content" class="hidden">
        <div class="message-box" id="messageBox">
            <p>เย้! นึกว่าจะไม่รักกันซะแล้ว 💖</p>
            <p>ขอบคุณที่เป็นความสุขให้กันเสมอมานะ</p>
            <p style="font-size: 1.5rem;">Happy Anniversary! 🌹</p>
        </div>
        <audio id="myAudio" loop><source src="Sunsets.mp3" type="audio/mpeg"></audio>
    </div>

    <script>
        // ตั้งค่าวันที่เริ่มคบกัน
        const startDate = new Date('2026-02-24'); 

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('days-count').innerText = days;
        }
        updateTimer();

        const startBtn = document.getElementById('start-btn');
        const questionArea = document.getElementById('question-area');
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const envelope = document.getElementById('envelope');
        const slideshow = document.getElementById('slideshow');
        const audio = document.getElementById('myAudio');
        const content = document.getElementById('surprise-content');

        // เมื่อกดปุ่มเริ่ม: ซ่อนปุ่มเริ่ม และโชว์คำถาม Yes/No
        startBtn.addEventListener('click', () => {
            startBtn.classList.add('hidden');
            questionArea.classList.remove('hidden');
        });

        // ปุ่ม No หนีเมาส์
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        });

        // เมื่อกด Yes: เริ่มสไลด์รูป เพลง และหัวใจตก
        yesBtn.addEventListener('click', () => {
            questionArea.classList.add('hidden');
            envelope.classList.add('hidden');
            slideshow.classList.remove('hidden');
            content.classList.remove('hidden');
            document.getElementById('messageBox').style.display = 'block';
            audio.play();
            createHearts();
            showSlides();
        });

        function createHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart-fall');
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = Math.random() * 3 + 2 + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 300);
        }

        let slideIndex = 0;
        function showSlides() {
            let slides = document.getElementsByClassName("mySlides");
            for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
            slideIndex++;
            if (slideIndex > slides.length) slideIndex = 1;
            slides[slideIndex-1].style.display = "block";
            setTimeout(showSlides, 3000);
        }
    </script>
</body>
</html>
