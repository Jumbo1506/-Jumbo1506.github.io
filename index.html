<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary My Love ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;500&family=Dancing+Script:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(180deg, #ffeef2 0%, #ffdeeb 100%);
            color: #555;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .heart-fall {
            position: fixed;
            top: -10%;
            color: #ff4d6d;
            font-size: 20px;
            user-select: none;
            z-index: -1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        header {
            margin-top: 40px;
            z-index: 1;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #ff4d6d;
            font-size: 4rem;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .timer-container {
            background: rgba(255, 255, 255, 0.6);
            padding: 15px 25px;
            border-radius: 50px;
            margin: 20px 0;
            font-weight: 500;
            color: #ff4d6d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 1;
        }

        /* ขยายขนาดกรอบรูปตามที่ต้องการ */
        .photo-frame {
            position: relative;
            width: 350px; 
            height: 350px; 
            border: 12px solid white;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            overflow: hidden;
            transition: 0.5s;
            cursor: pointer;
            z-index: 1;
            margin-bottom: 20px;
        }

        .photo-frame:hover {
            transform: scale(1.05) rotate(-3deg);
        }

        .slideshow-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .mySlides {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .mySlides img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .fade {
            animation-name: fade;
            animation-duration: 1.5s;
        }

        @keyframes fade {
            from {opacity: .4} 
            to {opacity: 1}
        }

        /* ขยายขนาดกล่องข้อความ */
        .message-box {
            max-width: 500px;
            width: 85%;
            background: white;
            padding: 40px;
            border-radius: 35px;
            margin: 30px auto;
            line-height: 2;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.15);
            border-bottom: 6px solid #ff4d6d;
            z-index: 1;
            display: none;
        }

        #start-btn {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Prompt', sans-serif;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            margin-top: 20px;
            z-index: 1;
        }

        #start-btn:hover {
            background: #ff758f;
            transform: translateY(-3px);
        }

        .hidden { display: none; }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.8rem;
            opacity: 0.7;
            z-index: 1;
        }
    </style>
</head>
<body>

    <header>
        <h1>Our Love Story</h1>
    </header>

    <div class="photo-frame">
        <div class="slideshow-container">
            <div class="mySlides fade"><img src="62805.jpg" alt="รูปที่ 1"></div>
            <div class="mySlides fade"><img src="62806.jpg" alt="รูปที่ 2"></div>
            <div class="mySlides fade"><img src="62807.jpg" alt="รูปที่ 3"></div>
            <div class="mySlides fade"><img src="62808.jpg" alt="รูปที่ 4"></div>
            <div class="mySlides fade"><img src="62809.jpg" alt="รูปที่ 5"></div>
            <div class="mySlides fade"><img src="62810.jpg" alt="รูปที่ 6"></div>
            <div class="mySlides fade"><img src="62811.jpg" alt="รูปที่ 7"></div>
            </div>
    </div>

    <div class="timer-container">
        เราอยู่ด้วยกันมาแล้ว <span id="days-count">0</span> วัน
    </div>

    <button id="start-btn">กดตรงนี้สิคับ❤️</button>

    <div id="surprise-content" class="hidden">
        <div class="message-box" id="messageBox">
            <p>ตั้งแต่วันแรกจนถึงวันนี้... ขอบคุณนะที่เป็นความสุขให้กัน</p>
            <p>ขอโทษที่บางทีอาจจะดื้อไปบ้าง แต่รักคนเดียวเสมอครับ</p>
            <p style="font-size: 1.5rem;">Happy Anniversary! 🌹</p>
        </div>
        <audio id="myAudio" loop>
            <source src="Sunsets.mp3" type="audio/mpeg">
        </audio>
    </div>

    <footer>Made with love for someone special</footer>

    <script>
        // 1. ตั้งค่าวันที่เริ่มคบกัน (แก้ปีจาก 2026 เป็นปีที่คุณเริ่มคบกันจริงๆ นะครับ)
        const startDate = new Date('2026-02-24'); 

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('days-count').innerText = days;
        }
        updateTimer();

        // 2. ระบบเริ่มเซอร์ไพรส์
        const startBtn = document.getElementById('start-btn');
        const audio = document.getElementById('myAudio');
        const content = document.getElementById('surprise-content');
        const messageBox = document.getElementById('messageBox');

        startBtn.addEventListener('click', () => {
            audio.play().catch(e => console.log("Audio play failed", e));
            content.classList.remove('hidden');
            messageBox.style.display = 'block';
            startBtn.classList.add('hidden');
            createHearts();
        });

        // 3. เอฟเฟกต์หัวใจตก
        function createHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart-fall');
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = Math.random() * 3 + 2 + 's';
                heart.style.opacity = Math.random();
                document.body.appendChild(heart);
                setTimeout(() => { heart.remove(); }, 5000);
            }, 300);
        }

        // 4. ระบบ Slideshow
        let slideIndex = 0;
        function showSlides() {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";  
            }
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1}    
            if (slides.length > 0) {
                slides[slideIndex-1].style.display = "block";  
            }
            setTimeout(showSlides, 3000); 
        }
        showSlides();
    </script>
</body>
</html>
